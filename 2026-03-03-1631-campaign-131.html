*, *::before, *::after { box-sizing: border-box; }
body {

.page-body {

.page-header {

.badge-success { background: var(--green-bg); color: var(--green); }

.elapsed-badge {

.diff-add { background: var(--diff-add-bg); color: var(--diff-add-text); }
.diff-del { background: var(--diff-del-bg); color: var(--diff-del-text); }
.diff-hunk { background: var(--diff-hunk-bg); color: var(--diff-hunk-text); font-weight: 600; }

hment from GCS: {e}\")\n+                    return None\n+                return result\n+\n+    return None\n \n \n async def list_attachments(\n-    pool: asyncpg.Pool, conversation_id: str\n+    router: ShardRouter, conversation_id: str\n ) -> list[dict]:\n-    \"\"\"List attachment metadata for all messages in a conversation.\"\"\"\n+    \"\"\"\n+    List attachment metadata for all messages in a conversation.\n+\n+    Routes to the appropriate shard based on conversation_id.\n+    Note: We don't include gcs_path in the response for security.\n+    \"\"\"\n+    pool = router.get_shard_for_conversation(conversation_id)\n+\n     async with pool.acquire() as conn:\n         rows = await conn.fetch(\n             \"\"\"\n@@ -417,9 +694,10 @@ async def list_attachments(\n \n \n async def poll_notifications(\n-    pool: asyncpg.Pool, user_id: str, since: str | None = None\n+    router: ShardRouter, user_id: str, since: str | None = None\n ) -> list[dict]:\n-    \"\"\"Long-poll for new notifications.\"\"\"\n+    \"\"\"Long-poll for new notifications (from global shard).\"\"\"\n+    pool = router.get_global_shard()\n     since_dt = (\n         datetime.fromisoformat(since)\n         if since\ndiff --git a/app/pool.py b/app/pool.py\nindex c0bd02f..fefe117 100644\n--- a/app/pool.py\n+++ b/app/pool.py\n@@ -1,15 +1,56 @@\n \"\"\"\n-Connection pool setup for the chat application.\n+Connection pool setup for the chat application with sharding support.\n \"\"\"\n \n import asyncpg\n \n \n-async def create_pool(dsn: str) -> asyncpg.Pool:\n-    \"\"\"Create an asyncpg connection pool.\"\"\"\n+async def create_pool(dsn: str, max_size: int = 20) -> asyncpg.Pool:\n+    \"\"\"Create an asyncpg connection pool.\n+\n+    Args:\n+        dsn: PostgreSQL connection string\n+        max_size: Maximum pool size (default 20)\n+    \"\"\"\n     pool = await asyncpg.create_pool(\n         dsn,\n         min_size=2,\n-        max_size=20,\n+        max_size=max_size,\n+        # Optimize for   \"\"\"Routes database operations to the appropriate shard based on conversation_id.\"\"\"\n+\n+    def __init__(self, pools: list[asyncpg.Pool]):\n+        \"\"\"\n+        Initialize the shard router with a list of connection pools.\n+\n+        Args:\n+            pools: List of asyncpg.Pool instances, one for each shard\n+        \"\"\"\n+        self.pools = pools\n+        self.num_shards = len(pools)\n+        if self.num_shards == 0:\n+            raise ValueError(\"At least one shard pool is required\")\n+\n+        # Semaphore to limit concurrent cross-shard operations\n+        # Increased from 3 to 15 to allow much higher parallelism\n+        # Each shard has 15 connections, so we can support many concurrent\n+        # cross-shard operations without exhausting connection pools\n+        # The individual pool limits will naturally rate-limit when under pressure\n+        self._cross_shard_semaphore = asyncio.Semaphore(15)\n+\n+    def get_shard_for_conversation(self, conversation_id: str | uuid.UUID) -> asyncpg.Pool:\n+        \"\"\"\n+        Determine which shard a conversation belongs to.\n+\n+        Uses MD5 hash of conversation_id for consistent routing.\n+\n+        Args:\n+            conversation_id: UUID or string representation of conversation ID\n+\n+        Returns:\n+            The asyncpg.Pool for the appropriate shard\n+        \"\"\"\n+        # Normalize to string\n+        conv_str = str(conversation_id)\n+\n+        # Hash the conversation ID\n+        hash_obj = hashlib.md5(conv_str.encode('utf-8'))\n+        hash_int = int.from_bytes(hash_obj.digest()[:4], byteorder='big')\n+\n+        # Map to shard index\n+        shard_idx = hash_int % self.num_shards\n+\n+        return self.pools[shard_idx]\n+\n+    def get_shard_for_user(self, user_id: str | uuid.UUID) -> asyncpg.Pool:\n+        \"\"\"\n+        Determine which shard a user's data belongs to.\n+\n+        For user-level operations (notifications, user profile), we use the first shard\n+        as a \"global\" shard to avoid data duplication and cross-shard queries.\n+\n+        Args:\n+            user_id: UUID or string representation of user ID\n+\n+        Returns:\n+            The asyncpg.Pool for the user data (always shard 0)\n+        \"\"\"\n+        # All user data goes to shard 0 (global shard)\n+        # This simplifies operations like broadcasts and user lookups\n+        return self.pools[0]\n+\n+    def get_all_shards(self) -> list[asyncpg.Pool]:\n+        \"\"\"\n+        Get all shard pools for operations that need to query all shards.\n+\n+        Used for operations like:\n+        - Listing all conversations for a user\n+        - Search across all conversations\n+        - Broadcasting notifications\n+\n+        Returns:\n+            List of all shard pools\n+        \"\"\"\n+        return self.pools\n+\n+    def get_global_shard(self) -> asyncpg.Pool:\n+        \"\"\"\n+        Get the global shard (shard 0) for shared data.\n+\n+        Used for:\n+        - User accounts\n+        - Notifications\n+        - System-wide operations\n+\n+        Returns:\n+            The first shard pool (global shard)\n+        \"\"\"\n+        return self.pools[0]\n+\n+    def acquire_cross_shard(self):\n+        \"\"\"\n+        Get the semaphore to limit concurrent cross-shard operations.\n+\n+        Usage:\n+            async with router.acquire_cross_shard():\n+                # Query all shards\n+                results = await asyncio.gather(...)\n+\n+        This prevents connection pool exhaustion when multiple requests\n+        try to fan-out to all shards simultaneously.\n+        \"\"\"\n+        return self._cross_shard_semaphore\ndiff --git a/app/storage.py b/app/storage.py\nnew file mode 100644\nindex 0000000..7efe4ff\n--- /dev/null\n+++ b/app/storage.py\n@@ -0,0 +1,157 @@\n+\"\"\"\n+GCS storage module for attachment handling.\n+\n+This module handles uploading and downloading attachments from Google Cloud Storage\n+instead of storing them as BYTEA in PostgreSQL, which was causing:\n+- Memory pressure on 256MB PostgreSQL instances\n+- WAL amplification from large binary writes\n+- Connection pool exhaustion during streaming\n+- TOAST bloat\n+\"\"\"\n+\n+import os\n+import uuid\n+from typing import BinaryIO\n+\n+from google.cloud import storage\n+\n+\n+class GCSStorage:\n+    \"\"\"Handle attachment storage in Google Cloud Storage.\"\"\"\n+\n+    def __init__(self, bucket_name: str | None = None):\n+        \"\"\"\n+        Initialize GCS storage client.\n+\n+        Args:\n+            bucket_name: GCS bucket name. If not provided, reads from GCS_BLOB_BUCKET env var.\n+        \"\"\"\n+        self.bucket_name = bucket_name or os.environ.get(\"GCS_BLOB_BUCKET\")\n+        if not self.bucket_name:\n+            raise ValueError(\"GCS_BLOB_BUCKET environment variable not set\")\n+\n+        # Initialize GCS client (uses Application Default Credentials)\n+        self.client = storage.Client()\n+        self.bucket = self.client.bucket(self.bucket_name)\n+\n+        # Try to create bucket if it doesn't exist (best-effort)\n+        try:\n+            if not self.bucket.exists():\n+                try:\n+                    self.bucket.create(location=\"us-central1\")\n+                except Exception:\n+                    # Ignore creation errors - bucket might exist or we might not have permission\n+                    # We'll get a clearer error on actual operations\n+                    pass\n+        except Exception:\n+            # Ignore existence check errors - we'll find out on actual operations\n+            pass\n+\n+    def _generate_blob_path(self, attachment_id: str, filename: str) -> str:\n+        \"\"\"\n+        Generate a GCS blob path for an attachment.\n+\n+        Format: attachments/{attachment_id}/{filename}\n+        This makes it easy to organize and debug.\n+        \"\"\"\n+        return f\"attachments/{attachment_id}/{filename}\"\n+\n+    def upload_attachment(\n+        self,\n+        attachment_id: str,\n+        filename: str,\n+        content_type: str,\n+        data: bytes\n+    ) -> str:\n+        \"\"\"\n+        Upload attachment data to GCS.\n+\n+        Args:\n+            attachment_id: UUID of the attachment record\n+            filename: Original filename\n+            content_type: MIME type\n+            data: File data as bytes\n+\n+        Returns:\n+            GCS blob path (key)\n+        \"\"\"\n+        blob_path = self._generate_blob_path(attachment_id, filename)\n+        blob = self.bucket.blob(blob_path)\n+\n+        # Upload with metadata\n+        blob.upload_from_string(\n+            data,\n+            content_type=content_type,\n+            # Set cache control for efficient downloads\n+            timeout=60\n+        )\n+\n+        return blob_path\n+\n+    def download_attachment(self, blob_path: str) -> bytes:\n+        \"\"\"\n+        Download attachment data from GCS.\n+\n+        Args:\n+            blob_path: GCS blob path returned from upload_attachment\n+\n+        Returns:\n+            File data as bytes\n+\n+        Raises:\n+            Exception: If blob not found or download fails\n+        \"\"\"\n+        blob = self.bucket.blob(blob_path)\n+\n+        if not blob.exists():\n+            raise FileNotFoundError(f\"Blob {blob_path} not found in GCS\")\n+\n+        # Download as bytes\n+        return blob.download_as_bytes(timeout=60)\n+\n+    def delete_attachment(self, blob_path: str) -> None:\n+        \"\"\"\n+        Delete attachment from GCS.\n+\n+        Args:\n+            blob_path: GCS blob path\n+        \"\"\"\n+        blob = self.bucket.blob(blob_path)\n+        blob.delete()\n+\n+    def get_blob_metadata(self, blob_path: str) -> dict:\n+        \"\"\"\n+        Get metadata about a blob without downloading it.\n+\n+        Args:\n+            blob_path: GCS blob path\n+\n+        Returns:\n+            Dict with metadata (size, content_type, etc.)\n+        \"\"\"\n+        blob = self.bucket.blob(blob_path)\n+        blob.reload()  # Fetch metadata from GCS\n+\n+        return {\n+            \"size\": blob.size,\n+            \"content_type\": blob.content_type,\n+            \"created\": blob.time_created,\n+            \"updated\": blob.updated,\n+        }\n+\n+\n+# Global singleton instance (lazy initialized on first use)\n+_storage_instance: GCSStorage | None = None\n+\n+\n+def get_storage() -> GCSStorage:\n+    \"\"\"\n+    Get or create the global GCS storage instance.\n+\n+    Returns:\n+        GCSStorage singleton instance\n+    \"\"\"\n+    global _storage_instance\n+    if _storage_instance is None:\n+        _storage_instance = GCSStorage()\n+    return _storage_instance\ndiff --git a/app/streaming.py b/app/streaming.py\nindex 49779f7..bd2d547 100644\n--- a/app/streaming.py\n+++ b/app/streaming.py\n@@ -1,5 +1,5 @@\n \"\"\"\n-Streaming response logic for the chat application.\n+Streaming response logic for the chat application with sharding support.\n \"\"\"\n \n from __future__ import annotations\n@@ -7,9 +7,13 @@ from __future__ import annotations\n import asyncio\n import random\n import uuid\n+from typing import TYPE_CHECKING\n \n import asyncpg\n \n+if TYPE_CHECKING:\n+    from app.shard_router import ShardRouter\n+\n \n # Simulated response chunks (like an LLM generating tokens)\n RESPONSE_FRAGMENTS = [\n@@ -31,20 +35,23 @@ RESPONSE_FRAGMENTS = [\n \n \n async def stream_response(\n-    pool: asyncpg.Pool,\n+    router: ShardRouter,\n     conversation_id: str,\n     user_content: str,\n     user_token_count: int,\n ) -> list[str]:\n-    \"\"\"Simulate a streaming LLM response.\n+    \"\"\"\n+    Simulate a streaming LLM response with sharding support.\n \n     Split into separate transactions so we don't hold a DB connection\n     during the simulated generation time.\n     \"\"\"\n     conv_uuid = uuid.UUID(conversation_id)\n+    shard_pool = router.get_shard_for_conversat <script>(function() {
  const DATA = window.__EXPORT_DATA__;
  const campaign = DATA.campaign;
  const trials = DATA.trials;
  const summary = DATA.summary;

  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderMd(s) {
    if (!s) return '';
    if (typeof marked !== 'undefined') {
      try { return marked.parse(s); } catch(e) {}
    }
    return esc(s);
  }

  function formatTs(iso) {
    if (!iso) return 'N/A';
    try {
      const d = new Date(iso);
      return d.toLocaleString();
    } catch(e) { return iso.slice(0, 19); }
  }

  function shortTs(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleTimeString();
    } catch(e) { return iso.slice(11, 19); }
  }

  function renderBehaviorTimeline(phases) {
    if (!phases || phases.length === 0) return '<span class="empty">no behavior data</span>';
    let out = '';
    for (let i = 0; i < phases.length; i++) {
      const p = phases[i];
      out += `<span class="bh-pill" style="background:${p.bg};color:${p.text};border:1px solid ${p.border}">${esc(p.label)}</span>`;
      if (i < phases.length - 1) out += '<span class="bh-arrow">&rarr;</span>';
    }
    return out;
  }

  // Render campaign header
  const hdr = document.getElementById('campaign-header');
  hdr.innerHTML = `
    <h1>${esc(campaign.name)}</h1>
    <div class="meta">
      Campaign #${campaign.id} &middot; ${esc(campaign.subject_name)} &middot;
      Variant: ${esc(campaign.variant_name)} &middot;
      ${formatTs(campaign.created_at)}
    </div>
  `;

  // Campaign notes
  if (campaign.notes) {
    const notesEl = document.getElementById('campaign-notes');
    notesEl.innerHTML = `<details><summary>Campaign Notes</summary><div style="white-space:pre-wrap;font-size:0.85rem;color:var(--text-secondary);padding:8px 0">${esc(campaign.notes)}</div></details>`;
    notesEl.style.display = 'block';
  }

  // Summary stats
  const statsEl = document.getElementById('summary-stats');
  statsEl.innerHTML = `
    <div class="stat"><div class="stat-value">${summary.win_rate}%</div><div class="stat-label">Win Rate</div></div>
    <div class="stat"><div class="stat-value">${summary.success_count}/${summary.total}</div><div class="stat-label">Succeeded</div></div>

  `;

    const label = t.is_baseline ? '<span class="badge badge-baseline">baseline</span> ' : '';
    html += `<tr class="clickable" data-trial-id="${t.id}">
      <td>${t.id}</td>
      <td>${label}${esc(t.chaos_description)}</td>
      <td><span class="badge ${badge}">${t.outcome}</span></td>
      <td>${t.detect_sec != null ? t.detect_sec + 's' : '-'}</td>
      <td>${t.resolve_sec != null ? t.resolve_sec + 's' : '-'}</td>
      <td>${t.cmd_count}</td>
      <td>${shortTs(t.started_at)}</td>
    </tr>`;
  }
  tbody.innerHTML = html;

  // Trial detail rendering
  const panel = document.getElementById('detail-panel');
  const trialMap = {};
  for (const t of trials) trialMap[t.id] = t;

  function renderDiff(diffStr) {
    if (!diffStr) return '<div class="empty">No code changes</div>';
    const lines = diffStr.split('\n');
    let out = '<div class="diff-block">';
    for (const line of lines) {
      let cls = '';
      if (line.startsWith('+') && !line.startsWith('+++')) cls = 'diff-add';
      else if (line.startsWith('-') && !line.startsWith('---')) cls = 'diff-del';
      else if (line.startsWith('@@')) cls = 'diff-hunk';
      out += `<div class="diff-line ${cls}">${esc(line)}</div>`;
    }
    out += '</div>';
    return out;
  }

  function renderDbDiff(diff) {
    if (!diff || !diff.has_changes) return '<div class="empty">No DB config changes</div>';
    let out = '';
    for (const s of (diff.settings_changed || [])) {
      out += `<div class="db-change db-change-mod">Setting <b>${esc(s.name)}</b>: ${esc(s.before)} &rarr; ${esc(s.after)}</div>`;
    }
    for (const idx of (diff.indexes_added || [])) {
      out += `<div class="db-change db-change-add">+ Index: ${esc(idx.definition)}</div>`;
    }
    for (const idx of (diff.indexes_removed || [])) {
      out += `<div class="db-change db-change-del">- Index: ${esc(idx.definition)}</div>`;
    }
    for (const tbl of (diff.tables_added || [])) {
      out += `<div class="db-change db-change-add">+ Table: ${esc(tbl)}</div>`;
    }
    for (const tbl of (diff.tables_removed || [])) {
      out += `<div class="db-change db-change-del">- Table: ${esc(tbl)}</div>`;
    }
    for (const col of (diff.columns_added || [])) {
      out += `<div class="db-change db-change-add">+ Column: ${esc(col.table)}.${esc(col.name)} (${esc(col.type)})</div>`;
    }
    for (const col of (diff.columns_removed || [])) {
      out += `<div class="db-change db-change-del">- Column: ${esc(col.table)}.${esc(col.name)} (${esc(col.type)})</div>`;
    }
    return out || '<div class="empty">No DB config changes</div>';
  }

  function renderCommands(cmds) {
    if (!cmds || cmds.length === 0) return '<div class="empty">No commands recorded</div>';
    const collapsed = cmds.length > 10;
    let inner = '<ul class="cmd-list">';
    for (const c of cmds) {
      const elapsed = c.elapsed_seconds != null ? `<span class="elapsed-badge">+${c.elapsed_seconds}s</span>` : '';
      inner += `<li class="cmd-item">
        <code class="cmd-command">${esc(c.command)}</code>
        ${elapsed}
        ${c.reasoning ? `<div class="cmd-reasoning">${renderMd(c.reasoning)}</div>` : ''}
      </li>`;
    }
    inner += '</ul>';
    if (collapsed) {
      return `<details><summary>Commands (${cmds.length})</summary>${inner}</details>`;
    }
    return inner;
  }

  function renderReasoning(entries) {
    if (!entries || entries.length === 0) return '<div class="empty">No reasoning data</div>';

    const reasoningOnly = entries.filter(e => e.entry_type !== 'tool_call');
    const toolCalls = entries.filter(e => e.entry_type === 'tool_call');

    let out = '';
    for (const e of reasoningOnly) {
      const elapsed = e.elapsed_seconds != null ? `<span class="elapsed-badge">+${e.elapsed_seconds}s</span>` : '';
      const content = e.content || '';
      out += `<div class="reasoning-entry" style="border-left:3px solid #a8a29e;padding:8px 12px;margin-bottom:6px;border-radius:0 4px 4px 0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span class="reasoning-type">reasoning</span>
          <span>${elapsed} ${e.timestamp ? `<span class="elapsed-badge">${shortTs(e.timestamp)}</span>` : ''}</span>
        </div>
        <div class="cmd-reasoning">${renderMd(content)}</div>
      </div>`;
    }

    if (toolCalls.length > 0) {
      let toolHtml = '';
      for (const e of toolCalls) {
        const elapsed = e.elapsed_seconds != null ? `<span class="elapsed-badge">+${e.elapsed_seconds}s</span>` : '';
        const toolLabel = `tool: ${esc(e.tool_name || 'unknown')}`;
        const content = e.content ? esc(e.content) : '';
        const reasoning = e.reasoning ? `<div class="cmd-reasoning">${renderMd(e.reasoning)}</div>` : '';
        toolHtml += `<details class="reasoning-entry">
          <summary>
            <span class="reasoning-type">${toolLabel}</span>
            ${elapsed}
            ${e.timestamp ? `<span class="elapsed-badge">${shortTs(e.timestamp)}</span>` : ''}
          </summary>
          ${content ? `<div class="reasoning-content">${content}</div>` : ''}
          ${reasoning}
        </details>`;
      }
      out += `<details style="margin-top:12px"><summary style="cursor:pointer;color:#78716c;font-size:0.85em">Tool calls (${toolCalls.length})</summary>${toolHtml}</details>`;
    }

    return out;
  }

  function showTrial(id, scroll = true) {
    const t = trialMap[id];
    if (!t) return;

    // Highlight selected row
    document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
    document.querySelectorAll(`tr[data-trial-id="${id}"]`).forEach(r => r.classList.add('selected'));

    const conclusionCls = t.outcome === 'success' ? '' : ' timeout';
    const conclusionText = t.agent_conclusion
      ? t.agent_conclusion.outcome_summary
      : (t.outcome === 'success' ? 'Resolved' : 'Not resolved within timeout');

    let detectionHtml = '<div class="empty">No detection data</div>';
    if (t.monitor_detection) {
      const m = t.monitor_detection;
      detectionHtml = `
        <div><b>Invariant:</b> ${esc(m.violation_type)}</div>
        <div><b>Details:</b> ${esc(m.violation_details)}</div>
        <div><b>Detected:</b> ${formatTs(m.detected_at)}</div>
      `;
    }

    panel.innerHTML = `
      <h2>Trial #${t.id}: ${esc(t.chaos_description)}</h2>
      <div class="conclusion-box${conclusionCls}">${renderMd(conclusionText)}</div>

      <div class="detail-grid" style="margin-top:16px">
        <div class="detail-section">
          <h3>Chaos Injection</h3>
          <div>${esc(t.chaos_description)}</div>
        </div>
        <div class="detail-section">
          <h3>Monitor Detection</h3>
          ${detectionHtml}
        </div>
      </div>

      <div class="detail-section">
        <h3>Timing</h3>
        <div>Started: ${formatTs(t.started_at)}</div>
        <div>Chaos injected: ${formatTs(t.chaos_injected_at)}</div>
        <div>Ticket created: ${formatTs(t.ticket_created_at)}${t.detect_sec != null ? ` (+${t.detect_sec}s)` : ''}</div>
        <div>Resolved: ${formatTs(t.resolved_at)}${t.resolve_sec != null ? ` (+${t.resolve_sec}s from chaos)` : ''}</div>
        <div>Ended: ${formatTs(t.ended_at)}</div>
      </div>

      <div class="detail-section">
        <h3>Commands</h3>
        ${renderCommands(t.commands_with_reasoning)}
      </div>

      <details class="detail-section">
        <summary>Code Changes</summary>
        ${renderDiff(t.code_diff)}
      </details>

      <details class="detail-section">
        <summary>DB Config Changes</summary>
        ${renderDbDiff(t.db_config_diff)}
      </details>

      <details class="detail-section">
        <summary>Reasoning Timeline (${(t.reasoning_entries || []).length} entries)</summary>
        ${renderReasoning(t.reasoning_entries)}
      </details>
    `;
    panel.classList.add('visible');
    if (scroll) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Click handler on trial rows
  tbody.addEventListener('click', function(e) {
    const row = e.target.closest('tr.clickable');
    if (!row) return;
    const id = parseInt(row.dataset.trialId, 10);
    if (id) showTrial(id);
  });

  // Auto-show first trial (without scrolling)
  if (trials.length > 0) {
    showTrial(trials[0].id, /* scroll */ false);
  }
})();
</script>
</body>
</html>
